name: Java CI/CD Container Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Self-Contained Docker Image
      run: |
        IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

        #  Generate a clean Date-Time Timestamp (Format: YYYYMMDD-HHMMSS)
        #  Force the Linux date utility to evaluate using Indian Standard Time
        TIMESTAMP=$(TZ="Asia/Kolkata" date +'%Y%m%d-%H%M%S')_IST
        
        echo "Generated Image Tag: $TIMESTAMP"
        
        # 3. Build the container, mapping both the fixed timestamp and moving latest pointer
        docker build \
          -t $IMAGE_NAME:$TIMESTAMP \
          -t $IMAGE_NAME:latest .
          
        # 4. Push all variants to the Container Registry
        docker push --all-tags $IMAGE_NAME