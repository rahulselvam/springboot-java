name: Java CI Build and Publish Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    # 1. Pull down the source code from your Git repository
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Setup the Java Development Kit environment (Matching your Java 17 target)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' # Caches dependencies between runs for faster pipeline execution

    # 3. Ensure the Gradle wrapper script has local executable script permissions
    - name: Grant Execute Permission to Gradle Wrapper
      run: chmod +x gradlew

    # 4. Run your automated test suites (Spring Boot Starter Test)
    - name: Run Unit & Integration Tests
      run: ./gradlew test

    # 5. Dynamically publish the compiled JAR using injected target configuration overrides
    - name: Build and Publish Artifact to Nexus
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Only publish on actual commits to main
      env:
        NEXUS_TARGET_URL: https://maven.pkg.github.com/${{ github.repository }}
        NEXUS_USER: ${{ github.actor }}
        NEXUS_PASS: ${{ secrets.GITHUB_TOKEN }}
      run: ./gradlew clean bootJar publish -x test