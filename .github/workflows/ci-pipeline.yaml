name: Java Enterprise DevSecOps Pipeline (EC2 Self-Hosted)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-and-build:
    # Target your specific EC2 self-hosted runner pool
    runs-on: [self-hosted, linux, ec2-runner]
    
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant Execute Permission to Gradle Wrapper
      run: chmod +x gradlew

    # ==========================================
    # STAGE 0: SECRET SCANNING (TruffleHog)
    # ==========================================
    - name: Scan for Hardcoded Secrets
      uses: trufflesecurity/trufflehog@main
      with:
      #  path: ./
      #  base: ${{ github.event.repository.default_branch }}
      #  head: ${{ github.ref_name }}
        extra_args: --results=verified,unknown

    # ==========================================
    # STAGE 2: SONARQUBE QUALITY GATE & SAST
    # ==========================================
    - name: Run SonarQube Code Quality Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} # Points directly to http://localhost:9000
      run: ./gradlew sonar --no-daemon

    # ==========================================
    # STAGE 3: TRIVY SCA SCAN & PUSH TO GITHUB
    # ==========================================
    - name: Run Trivy Vulnerability Scanner (SCA)
      uses: aquasecurity/trivy-action@v0.36.0  # Uses the latest stable action tag for 2026
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload FS Scan Results to GitHub Security Tab
      if: always() # Ensures logs are uploaded even if vulnerabilities are found
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'trivy-results.sarif'
        category: 'trivy-fs'

    # ==========================================
    # STAGE 4: PRODUCTION COMPILATION & GHCR PUSH
    # ==========================================
    - name: Log in to GHCR
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Self-Contained Docker Image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        # Preserves case configuration so standard GITHUB_TOKEN authorization works smoothly
        IMAGE_NAME="ghcr.io/${{ github.repository }}"
        TIMESTAMP=$(TZ="Asia/Kolkata" date +'%Y%m%d-%H%M%S')_IST
        
        echo "Building and pushing container image: $IMAGE_NAME:$TIMESTAMP"
        
        docker build \
          -t $IMAGE_NAME:$TIMESTAMP \
          -t $IMAGE_NAME:latest .
          
        docker push --all-tags $IMAGE_NAME