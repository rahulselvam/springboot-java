name: Java Enterprise DevSecOps Pipeline (EC2 Self-Hosted)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-and-build:
    # Target your specific EC2 self-hosted runner pool
    runs-on: [self-hosted, linux, ec2-runner]
    
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant Execute Permission to Gradle Wrapper
      run: chmod +x gradlew

    # ==========================================
    # STAGE 1: CHECKMARX SAST SCAN (Custom Code)
    # ==========================================
    # - name: Run Checkmarx AST Scan
    #   uses: checkmarx/ast-github-action@main
    #   with:
    #     base_uri: ${{ secrets.CX_BASE_URI }}
    #     client_id: ${{ secrets.CX_CLIENT_ID }}
    #     client_secret: ${{ secrets.CX_CLIENT_SECRET }}
    #     project_name: ${{ github.event.repository.name }}

    # ==========================================
    # STAGE 2: SONARQUBE QUALITY GATE & SAST
    # ==========================================
    - name: Run SonarQube Code Quality Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} # Points directly to http://localhost:9000
      run: ./gradlew sonar --no-daemon

    # ==========================================
    # STAGE 3: BLACK DUCK SCA SCAN (Dependencies)
    # ==========================================
    # - name: Run Black Duck Security Scan
    #   uses: blackduck-software/github-action@v2
    #   with:
    #     blackduck-url: ${{ secrets.BLACKDUCK_URL }}
    #     blackduck-api-token: ${{ secrets.BLACKDUCK_TOKEN }}
    #     scan-mode: 'RAPID' 

    # ==========================================
    # STAGE 3: TRIVY SCA SCAN & PUSH TO GITHUB
    # ==========================================
    - name: Run Trivy Vulnerability Scanner (SCA)
      uses: aquasecurity/trivy-action@v0.36.0  # Uses the latest stable action tag for 2026
      with:
        scan-type: 'fs'
        ignore-unfixed: true
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'HIGH,CRITICAL'

    - name: Upload Trivy Scan Results to GitHub Security Tab
      uses: github/codeql-action/upload-sarif@v3
      if: always() # Ensures reports upload even if vulnerabilities are found
      with:
        sarif_file: 'trivy-results.sarif'

    # ==========================================
    # STAGE 4: PRODUCTION COMPILATION & GHCR PUSH
    # ==========================================
    - name: Log in to GHCR
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Self-Contained Docker Image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        # Preserves case configuration so standard GITHUB_TOKEN authorization works smoothly
        IMAGE_NAME="ghcr.io/${{ github.repository }}"
        TIMESTAMP=$(TZ="Asia/Kolkata" date +'%Y%m%d-%H%M%S')_IST
        
        echo "Building and pushing container image: $IMAGE_NAME:$TIMESTAMP"
        
        docker build \
          -t $IMAGE_NAME:$TIMESTAMP \
          -t $IMAGE_NAME:latest .
          
        docker push --all-tags $IMAGE_NAME