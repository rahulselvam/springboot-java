plugins {
    id 'java'
    id 'org.springframework.boot' version '3.4.0'
    id 'io.spring.dependency-management' version '1.1.6'
    id 'maven-publish'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'

java {
    sourceCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    
    // DELIBERATE VULNERABILITY FOR TESTING SCA (BLACK DUCK / TRIVY)
    implementation 'org.apache.commons:commons-collections4:4.1'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
}

// 2. Added decoupled Maven publication metadata
publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
    // Notice: The "repositories" block is intentionally left blank. 
    // This forces Gradle to look for command-line injections from your pipeline.
}